<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="icon" href="favicon.svg" />
<title>Bloch Spheres &amp; Entanglement — Notes</title>
<style>
  :root{--bg:#0b1020;--ink:#e8edf7;--muted:#8a98b8;--b:#54a0ff;--line:#26324f;--panel:#121a30}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    line-height:1.6}
  .wrap{max-width:860px;margin:0 auto;padding:28px 22px 80px}
  .nav{display:flex;gap:14px;align-items:center;font-size:13px;margin-bottom:18px;
    border-bottom:1px solid var(--line);padding-bottom:12px}
  .nav a{color:var(--b);text-decoration:none}
  .nav a:hover{text-decoration:underline}
  h1,h2,h3{line-height:1.25}
  h1{font-size:26px} h2{font-size:20px;border-bottom:1px solid var(--line);padding-bottom:6px;margin-top:34px}
  h3{font-size:16px;color:var(--b)}
  a{color:var(--b)}
  code{background:var(--panel);padding:1px 5px;border-radius:4px;font-size:.92em}
  pre{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:12px 14px;
    overflow-x:auto}
  pre code{background:none;padding:0}
  blockquote{border-left:3px solid var(--b);margin:0;padding:2px 16px;color:#c4cfe6;background:#0e1526}
  table{border-collapse:collapse;width:100%;margin:14px 0;font-size:14px}
  th,td{border:1px solid var(--line);padding:7px 10px;text-align:left}
  th{background:var(--panel)}
  hr{border:none;border-top:1px solid var(--line);margin:28px 0}
  .err{background:#2a1620;border:1px solid #5a2740;border-radius:8px;padding:16px}
</style>
</head>
<body>
  <div class="wrap">
    <div class="nav">
      <a href="index.html">← Overview</a>
      <a href="one-qubit.html">1 qubit</a>
      <a href="two-qubit.html">2 qubits</a>
      <a href="three-qubit.html">3 qubits</a>
      <a href="bloch-sphere-and-entanglement.md">raw .md</a>
    </div>
    <article id="content">Loading notes…</article>
  </div>

  <script src="vendor/marked.min.js"></script>
  <script>
    fetch('bloch-sphere-and-entanglement.md')
      .then(r => { if (!r.ok) throw new Error(r.status); return r.text(); })
      .then(md => { document.getElementById('content').innerHTML = marked.parse(md); })
      .catch(() => {
        document.getElementById('content').innerHTML =
          '<div class="err"><b>Could not load the notes.</b><br>' +
          'Rendering needs to be served over HTTP (GitHub Pages, or <code>docker-compose up</code>) — ' +
          'browsers block <code>fetch()</code> of local files when opened with <code>file://</code>.<br><br>' +
          'Read the source directly: <a href="bloch-sphere-and-entanglement.md">bloch-sphere-and-entanglement.md</a></div>';
      });
  </script>
</body>
</html>
